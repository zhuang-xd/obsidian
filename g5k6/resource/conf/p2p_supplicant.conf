ctrl_interface=/var/run/wpa_supplicant
device_name=p2p-test
update_config=1
device_type=10-0050F204-5
config_methods=display push_button keypad virtual_push_button physical_display
p2p_add_cli_chan=1

# 角色配置
p2p_go_intent=15                    # 强烈希望成为GO（0-15，15最强烈）
p2p_go_ht40=1                       # 启用HT40
p2p_go_vht=1                        # 启用VHT
p2p_go_he=1                         # 启用Wi-Fi 6（如果支持）
p2p_go_max_inactivity=0             # 永不自动断开（0=禁用）

# 发现和监听配置 - 兼容国内外信道
p2p_listen_reg_class=81                          # 2.4GHz频段
p2p_listen_channel=6                             # 监听信道6（全球通用）
p2p_oper_reg_class=81                            # 操作频段
p2p_oper_channel=6                               # 操作信道6（全球通用）
p2p_pref_chan=6:2 1:2 11:2 36:5 40:5 44:5 48:5   # 首选信道：2.4GHz优先，兼顾常见5GHz

# 服务端特定参数 - 增强稳定性
p2p_intra_bss=1                      # 允许群组内通信
persistent_reconnect=1               # 持久重连（断线后自动重连）
p2p_no_group_iface=0                 # 允许多个组接口（0=禁用，单接口更稳定）
p2p_optimize_listen_chan=1           # 优化监听信道选择
p2p_go_freq_change_policy=0          # GO频率变更策略（0=不允许，保持稳定）

# 连接稳定性优化
p2p_search_delay=100                 # P2P搜索延迟（毫秒，降低延迟提高响应速度）

# 功率管理和性能优化
p2p_disabled=0                       # 启用P2P功能
p2p_group_idle=0                     # 组空闲超时（0=禁用，保持组活跃）

# 安全配置
pmf=2                                # 强制使用PMF（Protected Management Frames）
p2p_ignore_shared_freq=1             # 忽略共享频率干扰（避免与WiFi AP冲突）
p2p_go_ctwindow=0                    # GO CTWindow（0=禁用，提高兼容性）

# 国家代码和法规
country=00                           # 世界通用（避免仅限中国信道）